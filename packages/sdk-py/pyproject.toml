[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "memoroos-eval-sdk"
version = "0.1.0"
description = "Python SDK for the MemroOS Public Eval API"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["memoroos_eval_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
