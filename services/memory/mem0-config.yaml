vector_store:
  provider: qdrant
  config:
    collection_name: agent_memory_local
    url: "https://f969d77f-3cf6-4557-92cb-67f7cac0f44a.us-west-1-0.aws.cloud.qdrant.io:6333"
    api_key_env: QDRANT_API_KEY
    embedding_model_dims: 768

llm:
  provider: ollama
  config:
    model: qwen2.5:3b
    ollama_base_url_env: OLLAMA_BASE_URL

embedder:
  provider: ollama
  config:
    model: nomic-embed-text
    embedding_dims: 768
    ollama_base_url_env: OLLAMA_BASE_URL

custom_fact_extraction_prompt: |
  Extract durable, searchable facts from the Input.
  Return valid JSON only in exactly this shape:
  {"facts":["one flat string fact","another flat string fact"]}
  Every item in facts must be a single string. Do not return nested arrays,
  objects, categories, tags, markdown, or commentary.
  If there are no durable facts, return {"facts":[]}.
